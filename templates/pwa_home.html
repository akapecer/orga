{% load static %}
<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Orga</title>
    <style>
        :root {
            --bg: #f5f1ea;
            --ink: #1f1f1f;
            --muted: #6b6257;
            --card: rgba(255, 255, 255, 0.78);
            --line: rgba(31, 31, 31, 0.08);
            --accent: #1f1f1f;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: Georgia, "Times New Roman", serif;
            color: var(--ink);
            background:
                radial-gradient(circle at top, rgba(255, 255, 255, 0.9), transparent 38%),
                linear-gradient(160deg, #efe6d7 0%, var(--bg) 45%, #e8ddd0 100%);
            padding: 24px;
        }

        .shell {
            width: min(100%, 440px);
            border: 1px solid var(--line);
            border-radius: 28px;
            background: var(--card);
            backdrop-filter: blur(14px);
            box-shadow: 0 24px 80px rgba(31, 31, 31, 0.12);
            padding: 28px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 28px;
        }

        .brand img {
            width: 72px;
            height: 72px;
            border-radius: 18px;
            background: white;
            padding: 10px;
            box-shadow: 0 10px 30px rgba(31, 31, 31, 0.08);
        }

        h1 {
            margin: 0;
            font-size: 2.2rem;
            line-height: 1;
        }

        p {
            margin: 0;
            color: var(--muted);
            line-height: 1.5;
        }

        .actions {
            display: grid;
            gap: 12px;
            margin-top: 28px;
        }

        .button {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            min-height: 54px;
            padding: 0 18px;
            border-radius: 16px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1rem;
            transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
        }

        .button-primary {
            background: var(--accent);
            color: white;
            box-shadow: 0 16px 32px rgba(31, 31, 31, 0.18);
        }

        .button-secondary {
            background: rgba(255, 255, 255, 0.7);
            color: var(--ink);
            border: 1px solid var(--line);
        }

        .button:active {
            transform: translateY(1px);
        }

        .note {
            margin-top: 18px;
            font-size: 0.92rem;
        }
    </style>
</head>
<body>
    <main class="shell">
        <div class="brand">
            <img src="{% static 'images/logo_pwa_192.png' %}" alt="Orga">
            <div>
                <h1>Orga</h1>
                <p>Dashboard e menu digitale del tuo ristorante.</p>
            </div>
        </div>

        <p>Apri l'area di gestione in una vista piu pulita per la schermata Home del tuo iPhone.</p>

        <div class="actions">
            <a class="button button-primary" href="/admin/login/">Accedi alla dashboard</a>
            <a class="button button-secondary" href="/admin/">Vai all'admin</a>
        </div>

        <p class="note">Se hai gia effettuato l'accesso, Orga ti portera direttamente alla dashboard.</p>
    </main>
</body>
</html>
